<style>
.hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;

    background:
        linear-gradient(
            rgba(0, 6, 22, 0.35),
            rgba(0, 8, 30, 0.78)
        ),
        url('assets/Blue Img.png');

    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 20px 90px;
}

/* glow cinematic peste fundal */
.hero::before{
    content:'';
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
        radial-gradient(circle at top left,
        rgba(0,191,255,.18),
        transparent 25%),

        radial-gradient(circle at top right,
        rgba(0,191,255,.12),
        transparent 28%),

        linear-gradient(
        to bottom,
        rgba(0,0,0,.05),
        rgba(0,0,0,.28)
        );
}

/* blur premium subtil */
.hero::after{
    content:'';
    position:absolute;
    inset:0;
    backdrop-filter: blur(1px);
    pointer-events:none;
}

.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
    max-width:1200px;
}

/* LOGO PREMIUM */
.hero-logo{
    width:220px;
    max-width:85%;
    margin:0 auto 18px;
    display:block;

    filter:
    drop-shadow(0 0 20px rgba(0,191,255,.35))
    drop-shadow(0 0 50px rgba(0,191,255,.18));

    transition:.3s ease;
}

.hero-logo:hover{
    transform:scale(1.02);
}

/* TITLU */
.hero-title{
    font-size: clamp(48px,7vw,88px);
    font-weight:700;
    color:#ffffff;
    letter-spacing:-2px;
    margin-bottom:8px;
    text-shadow:
        0 0 35px rgba(0,170,255,.22),
        0 0 8px rgba(255,255,255,.15);
}

/* SLOGAN PREMIUM */
.hero-subtitle{
    font-size: clamp(15px,2vw,23px);
    color:#f4faff;
    letter-spacing:5px;
    text-transform:uppercase;
    font-weight:300;
    margin-bottom:34px;

    font-family:
    "Segoe UI Light",
    "Helvetica Neue",
    sans-serif;

    text-shadow:
        0 0 15px rgba(0,191,255,.18);
}

/* ON AIR */
.hero-live{
    color:#16d5ff;
    font-weight:700;
    letter-spacing:6px;
    font-size:19px;
    text-transform:uppercase;

    text-shadow:
        0 0 14px rgba(0,212,255,.55),
        0 0 35px rgba(0,212,255,.22);
}

/* responsive telefon */
@media(max-width:768px){

.hero{
    padding:110px 18px 70px;
    background-attachment:scroll;
}

.hero-title{
    font-size:52px;
    line-height:1;
}

.hero-subtitle{
    font-size:14px;
    letter-spacing:2px;
}

.hero-live{
    font-size:15px;
    letter-spacing:4px;
}

.hero-logo{
    width:160px;
}
}
</style>
