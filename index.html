<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunMotion Radio</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Poppins,sans-serif;color:#fff;background:#02070c}

body:before{
content:"";
position:fixed;
inset:0;
background:url('assets/blue.png') center center/cover no-repeat;
z-index:-3;
}

body:after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,20,38,.38),rgba(0,0,0,.72));
z-index:-2;
}

.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 28px;
background:rgba(0,5,12,.72);
border-bottom:1px solid rgba(0,190,255,.32);
backdrop-filter:blur(10px);
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.coin{
width:42px;
height:42px;
border-radius:50%;
display:grid;
place-items:center;
border:1px solid #12c8ff;
background:radial-gradient(circle,#ffd84a 8%,#0b4b73 45%,#03101c 75%);
font-size:12px;
font-weight:900;
box-shadow:0 0 18px rgba(0,190,255,.6);
}

.brand-name{
font-family:"Great Vibes",cursive;
font-size:38px;
text-shadow:0 0 12px #000;
}

.nav{
display:flex;
gap:25px;
align-items:center;
}

.nav a{
color:white;
text-decoration:none;
font-size:13px;
font-weight:900;
letter-spacing:.03em;
}

.nav a:hover,.nav a.active{color:#13c8ff}

.home{
height:calc(100vh - 70px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding-bottom:18px;
}

.logo-circle{
width:335px;
height:335px;
border-radius:50%;
border:3px solid #10c8ff;
background:rgba(0,10,22,.36);
box-shadow:0 0 46px rgba(0,190,255,.76),inset 0 0 42px rgba(0,160,255,.15);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
margin-bottom:18px;
}

.sun{
position:absolute;
top:63px;
font-size:37px;
color:#ffd52c;
filter:drop-shadow(0 0 10px #ffd52c);
}

.script{
font-family:"Great Vibes",cursive;
font-size:72px;
line-height:.9;
text-shadow:0 5px 18px #000;
}

.radio{
font-size:36px;
font-weight:900;
letter-spacing:.22em;
color:#14c7ff;
text-shadow:0 0 18px #0dbdff;
margin-left:16px;
}

.beat{
display:flex;
gap:5px;
align-items:end;
height:38px;
margin-top:10px;
}

.beat span{
width:9px;
background:#14c7ff;
box-shadow:0 0 12px #14c7ff;
}

.beat span:nth-child(1){height:10px}
.beat span:nth-child(2){height:17px}
.beat span:nth-child(3){height:26px}
.beat span:nth-child(4){height:37px}
.beat span:nth-child(5){height:26px}
.beat span:nth-child(6){height:17px}
.beat span:nth-child(7){height:10px}

.tagline{
font-size:18px;
margin-bottom:24px;
text-shadow:0 4px 14px #000;
}

.tagline span{color:#15c9ff;font-size:23px}

.player{
width:min(890px,84vw);
min-height:98px;
border-radius:15px;
background:rgba(0,13,27,.76);
border:1px solid #10bfff;
box-shadow:0 0 34px rgba(0,160,255,.34), inset 0 0 24px rgba(0,95,170,.18);
backdrop-filter:blur(12px);
display:grid;
grid-template-columns:64px 1fr 135px 185px 80px;
align-items:center;
gap:18px;
padding:20px 26px;
}

.play{
width:54px;
height:54px;
border-radius:50%;
border:1px solid #10bfff;
background:rgba(0,45,80,.75);
color:white;
font-size:24px;
cursor:pointer;
box-shadow:0 0 22px rgba(0,190,255,.55);
}

.label{
color:#14c7ff;
font-size:12px;
font-weight:900;
letter-spacing:.15em;
margin-bottom:6px;
}

.track{
font-size:19px;
font-weight:900;
line-height:1.15;
}

.station{
font-size:13px;
color:#c7f0ff;
margin-top:6px;
}

.eq{
height:50px;
display:flex;
align-items:end;
justify-content:center;
gap:7px;
}

.eq i{
width:8px;
border-radius:10px;
background:#13c7ff;
box-shadow:0 0 15px #13c7ff;
animation:bounce 1s ease-in-out infinite;
}

.eq i:nth-child(1){height:18px}
.eq i:nth-child(2){height:29px}
.eq i:nth-child(3){height:42px}
.eq i:nth-child(4){height:50px}
.eq i:nth-child(5){height:38px}
.eq i:nth-child(6){height:28px}
.eq i:nth-child(7){height:21px}

@keyframes bounce{50%{height:16px;opacity:.6}}

.volume{
display:flex;
align-items:center;
gap:10px;
}

input[type=range]{
width:120px;
accent-color:#12c7ff;
}

.live{
display:flex;
align-items:center;
gap:8px;
font-size:16px;
font-weight:900;
color:#18caff;
}

.live b{
width:12px;
height:12px;
border-radius:50%;
background:#18caff;
box-shadow:0 0 18px #18caff;
}

.quick{
display:flex;
gap:20px;
margin-top:20px;
}

.quick a{
width:190px;
height:78px;
border:1px solid rgba(0,190,255,.75);
border-radius:13px;
background:rgba(0,12,25,.66);
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:#14c7ff;
font-size:14px;
font-weight:900;
box-shadow:0 0 22px rgba(0,140,255,.22);
backdrop-filter:blur(8px);
}

.footer{
position:fixed;
bottom:12px;
left:0;
width:100%;
text-align:center;
color:#18caff;
font-size:22px;
font-weight:900;
letter-spacing:.22em;
text-shadow:0 0 18px #0fb9ff;
}

@media(max-width:950px){
html,body{overflow:auto}
.topbar{height:auto;padding:12px;flex-direction:column;gap:10px}
.nav{gap:14px;flex-wrap:wrap;justify-content:center}
.home{height:auto;min-height:100vh;padding:32px 16px 90px}
.player{grid-template-columns:60px 1fr;gap:14px}
.eq,.volume,.live{justify-self:start}
.quick{flex-wrap:wrap;justify-content:center}
}
</style>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <div class="coin">SM</div>
    <div class="brand-name">SunMotion Radio</div>
  </div>

  <nav class="nav">
    <a class="active" href="#">HOME</a>
    <a href="#">LISTEN LIVE</a>
    <a href="#">SHOWS</a>
    <a href="#">DJs</a>
    <a href="https://xat.com/SunMotion_Radio" target="_blank">CHAT</a>
    <a href="#">PODCAST</a>
    <a href="#">NEWS</a>
    <a href="#">ABOUT</a>
    <a href="#">CONTACT</a>
  </nav>
</header>

<main class="home">

  <div class="logo-circle">
    <div class="sun">☀</div>
    <div class="script">SunMotion</div>
    <div class="radio">RADIO</div>
    <div class="beat">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="tagline">Live Music, good vibes & non-stop energy <span>♡</span></div>

  <section class="player">
    <button class="play" id="playBtn">▶</button>

    <div>
      <div class="label">NOW PLAYING</div>
      <div class="track" id="trackTitle">SunMotion Radio Live</div>
      <div class="station">SunMotion Radio Live</div>
    </div>

    <div class="eq">
      <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
    </div>

    <div class="volume">
      <span>🔊</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
    </div>

    <div class="live"><b></b> LIVE</div>
  </section>

  <div class="quick">
    <a href="#">🎧 &nbsp; LISTEN LIVE</a>
    <a href="https://xat.com/SunMotion_Radio" target="_blank">💬 &nbsp; LIVE CHAT</a>
    <a href="#">🎙️ &nbsp; DJs</a>
    <a href="#">📰 &nbsp; NEWS</a>
  </div>

</main>

<div class="footer">ON AIR 24/7</div>

<audio id="radioAudio" src="https://sunmotionradioonline.duckdns.org/listen/sunmotionradio/radio.mp3"></audio>

<script>
const audio = document.getElementById("radioAudio");
const btn = document.getElementById("playBtn");
const volume = document.getElementById("volume");

btn.onclick = () => {
  if (audio.paused) {
    audio.play();
    btn.textContent = "Ⅱ";
  } else {
    audio.pause();
    btn.textContent = "▶";
  }
};

volume.oninput = () => audio.volume = volume.value;
audio.volume = 0.8;
</script>

</body>
</html>
